<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NeuralTrace — Microphone Access</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 40px 20px;
    }
    h2 { font-size: 20px; margin-bottom: 12px; }
    p { color: #a0a0a0; font-size: 14px; line-height: 1.6; }
    .status { margin-top: 16px; font-size: 14px; font-weight: 500; }
    .status.success { color: #22c55e; }
    .status.error { color: #f87171; }
    .status.info { color: #F27059; }
  </style>
</head>
<body>
  <h2>NeuralTrace Voice Input</h2>
  <p>Click <strong style="color:#f5f5f5">Allow</strong> on Chrome's prompt above to enable voice input.</p>
  <div class="status info" id="status">Requesting microphone access...</div>
  <script src="mic-permission.js"></script>
</body>
</html>
