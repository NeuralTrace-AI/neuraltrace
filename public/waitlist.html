<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuralTrace — Waitlist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0F;
      color: #E0E0E0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 440px;
      padding: 40px 24px;
    }
    .logo {
      max-width: 280px;
      height: auto;
      margin: 0 auto 32px;
    }
    .tagline {
      font-size: 18px;
      color: #A0A0B0;
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .form-group {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .email-input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid #2A2A35;
      background: #16161D;
      color: #FFFFFF;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .email-input:focus {
      border-color: #E8614D;
    }
    .email-input::placeholder {
      color: #555;
    }
    .submit-btn {
      padding: 14px 28px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #E8614D, #D94B7A);
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .message {
      font-size: 14px;
      margin-top: 8px;
      min-height: 20px;
    }
    .message.success { color: #4ADE80; }
    .message.error { color: #E8614D; }
    .subtitle {
      font-size: 13px;
      color: #555;
      margin-top: 32px;
    }
    @media (max-width: 480px) {
      .form-group {
        flex-direction: column;
      }
      .submit-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo-full.png" alt="NeuralTrace" class="logo">
    <p class="tagline">Your AI should never forget who you are.<br>One vault. Every AI. Save it once and never explain yourself again.</p>

    <form id="waitlist-form">
      <div class="form-group">
        <input type="email" class="email-input" id="email" placeholder="Enter your email" required>
        <button type="submit" class="submit-btn" id="submit-btn">Join Waitlist</button>
      </div>
      <p class="message" id="message"></p>
    </form>

    <p class="subtitle">Be first to try the memory layer for all your AI tools.</p>
  </div>

  <script>
    const form = document.getElementById('waitlist-form');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submit-btn');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      if (!email) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Joining...';
      message.textContent = '';
      message.className = 'message';

      try {
        const res = await fetch('https://n8n.clickconvertpros.com/webhook/neuraltrace-waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.success) {
          message.textContent = "You're on the list! We'll be in touch soon.";
          message.className = 'message success';
          emailInput.value = '';
        } else {
          throw new Error('Signup failed');
        }
      } catch (err) {
        message.textContent = 'Something went wrong. Please try again.';
        message.className = 'message error';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join Waitlist';
      }
    });
  </script>
</body>
</html>
