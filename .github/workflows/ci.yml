name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check server starts
        run: |
          ADMIN_PASSWORD=test NEURALTRACE_MODE=selfhosted node build/index.js &
          SERVER_PID=$!
          sleep 3
          curl -f http://localhost:3000/health || (kill $SERVER_PID && exit 1)
          kill $SERVER_PID
